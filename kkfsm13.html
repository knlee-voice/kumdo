<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제13대 한국사회인검도연맹</title>
<style>
/* ── 리셋 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── 토큰 (kkfsm13-championship39th.html 톤) ── */
:root {
  --bg:       #f5f5f3;
  --white:    #ffffff;
  --border:   #e2e2de;
  --text:     #1a1a18;
  --text2:    #52524e;
  --text3:    #9a9a96;
  --navy:     #1B3F7A;
  --navybg:   #eef2f9;
  --gold:     #8a5e00;
  --goldbg:   #fdf5e6;
  --red:      #8a1f1f;
  --redbg:    #fdf0f0;
  --green:    #1a5e38;
  --greenbg:  #edf6f1;
  --rad:      12px;
  --rad-sm:   8px;
  --shadow:   0 1px 3px rgba(0,0,0,.07), 0 3px 12px rgba(0,0,0,.05);
}

/* ── 기본 ── */
html { background: var(--bg); }
body {
  font-family: -apple-system, BlinkMacSystemFont,
               'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 500px;
  margin: 0 auto;
  min-height: 100vh;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ════════════════════════════════
   헤더
════════════════════════════════ */
.hdr {
  background: #0f2447;
  padding: 26px 20px 22px;
  text-align: center;
  position: sticky; top: 0; z-index: 200;
}
.hdr-title {
  font-size: 22px; font-weight: 800; color: #fff;
  line-height: 1.3; letter-spacing: -.01em;
}
.hdr-title em { color: #F0C040; font-style: normal; }
.hdr-info {
  margin-top: 8px; font-size: 12px;
  color: rgba(255,255,255,.55); line-height: 1.5;
  letter-spacing: .02em;
}

/* ════════════════════════════════
   메인
════════════════════════════════ */
.main { padding: 22px 16px 40px; }

.sec-label {
  font-size: 18px; font-weight: 800; color: var(--navy);
  letter-spacing: -.01em;
  margin: 8px 4px 12px;
  padding-left: 10px;
  border-left: 4px solid var(--navy);
  line-height: 1.2;
}
.sec-label:not(:first-child) { margin-top: 28px; }

/* ════════════════════════════════
   링크 카드
════════════════════════════════ */
.link-card {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 14px 16px 18px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--rad);
  border-left: 4px solid var(--navy);
  box-shadow: var(--shadow);
  margin-bottom: 10px;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  transition: transform .12s ease, box-shadow .15s ease;
  position: relative;
}
.link-card:active { transform: scale(.985); }
.link-card:hover { box-shadow: 0 2px 6px rgba(0,0,0,.09), 0 6px 20px rgba(0,0,0,.07); }

/* 좌측 색상 액센트 변형 */
.link-card.gold  { border-left-color: var(--gold); }
.link-card.red   { border-left-color: var(--red); }
.link-card.green { border-left-color: var(--green); }

/* 아이콘 원형 */
.lc-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--navybg); color: var(--navy);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.link-card.gold  .lc-icon { background: var(--goldbg);  color: var(--gold); }
.link-card.red   .lc-icon { background: var(--redbg);   color: var(--red); }
.link-card.green .lc-icon { background: var(--greenbg); color: var(--green); }

.lc-body { flex: 1; min-width: 0; }
.lc-title {
  font-size: 16px; font-weight: 800; color: var(--text);
  line-height: 1.4; letter-spacing: -.01em;
}
.lc-sub {
  font-size: 13px; color: var(--text2); margin-top: 4px;
  line-height: 1.5;
  clear: both; /* 배지 float 아래로 확실히 내려오도록 */
}

.lc-arrow {
  font-size: 20px; color: var(--text3);
  flex-shrink: 0; margin-left: 4px;
}

/* 배지 — 제목 첫 줄 오른쪽에 배치 (float로 텍스트가 배지를 감싸도록) */
.lc-badge {
  float: right;
  margin-left: 8px; margin-top: 2px;
  font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 999px;
  letter-spacing: .02em; white-space: nowrap;
  background: var(--navybg); color: var(--navy);
}
.lc-badge.gold  { background: var(--goldbg);  color: var(--gold); }
.lc-badge.red   { background: var(--redbg);   color: var(--red); }
.lc-badge.mute  { background: #ececea;        color: var(--text3); }

/* 비활성(준비중) 카드 */
.link-card.disabled {
  cursor: not-allowed;
  background: var(--bg);
  opacity: .8;
}
.link-card.disabled:active { transform: none; }
.link-card.disabled:hover  { box-shadow: var(--shadow); }
.link-card.disabled .lc-title { color: var(--text2); }
.link-card.disabled .lc-arrow { display: none; }

/* ════════════════════════════════
   푸터
════════════════════════════════ */
.footer {
  margin-top: 26px;
  padding: 14px 16px 4px;
  text-align: center;
  color: var(--text3);
  font-size: 12px;
  line-height: 1.7;
}
.footer .sig {
  display: inline-flex; align-items: center; justify-content: center;
  margin-top: 4px;
}

/* ════════════════════════════════
   반응형
════════════════════════════════ */
@media (max-width: 360px) {
  .hdr-title { font-size: 20px; }
  .lc-title  { font-size: 14px; }
  .lc-icon   { width: 40px; height: 40px; font-size: 20px; }
}
</style>
</head>
<body>

<!-- ════════ 헤더 ════════ -->
<header class="hdr">
  <div class="hdr-title">제13대 <em>한국사회인검도연맹</em></div>
  <div class="hdr-info">공식 안내 · 대회 아카이브</div>
</header>

<!-- ════════ 메인 ════════ -->
<main class="main">

  <div class="sec-label">연맹 소개</div>

  <!-- 1. 공식 홈페이지 -->
  <a href="http://www.kumdos.org/" class="link-card" target="_blank" rel="noopener noreferrer">
    <div class="lc-icon">🌐</div>
    <div class="lc-body">
      <div class="lc-title"><span class="lc-badge">OFFICIAL</span>한국사회인검도연맹 소개</div>
      <div class="lc-sub">공식 홈페이지 · www.kumdos.org</div>
    </div>
    <div class="lc-arrow">›</div>
  </a>

  <!-- 2. 모바일 버전 -->
  <a href="#" class="link-card gold" target="_blank" rel="noopener noreferrer">
    <div class="lc-icon">📱</div>
    <div class="lc-body">
      <div class="lc-title"><span class="lc-badge gold">MOBILE</span>한국사회인검도연맹 소개</div>
      <div class="lc-sub">모바일 버전</div>
    </div>
    <div class="lc-arrow">›</div>
  </a>

  <div class="sec-label">국제오픈 한국사회인검도대회</div>

  <!-- 3. 제39회 (종료) -->
  <a href="kkfsm13-championship39th.html" class="link-card red">
    <div class="lc-icon">🏆</div>
    <div class="lc-body">
      <div class="lc-title"><span class="lc-badge red">종료</span>제39회 국제오픈 한국사회인검도대회</div>
      <div class="lc-sub">2026 · 가평 한석봉체육관</div>
    </div>
    <div class="lc-arrow">›</div>
  </a>

  <!-- 4. 제40회 (준비중) -->
  <div class="link-card green disabled" aria-disabled="true">
    <div class="lc-icon">🏅</div>
    <div class="lc-body">
      <div class="lc-title"><span class="lc-badge mute">준비중</span>제40회 국제오픈 한국사회인검도대회</div>
      <div class="lc-sub">2027 · 준비 중</div>
    </div>
  </div>

  <div class="footer">
    <div>© 한국사회인검도연맹</div>
    <div class="sig">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 78 22" width="78" height="22">
        <defs>
          <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2a5298"/>
            <stop offset="100%" stop-color="#0f2447"/>
          </linearGradient>
        </defs>
        <text x="2" y="15"
              font-family="'Palatino Linotype','Book Antiqua',Georgia,serif"
              font-size="9" fill="#9a9a96" font-style="italic"
              dominant-baseline="middle"
              letter-spacing="0.5">제작</text>
        <text x="26" y="15"
              font-family="'Palatino Linotype','Book Antiqua',Georgia,serif"
              font-size="14" font-weight="700" font-style="italic"
              fill="url(#cg)" letter-spacing="1.5"
              dominant-baseline="middle">NIM</text>
        <path d="M26,19 Q42,21 62,18" fill="none" stroke="#F0C040" stroke-width="1.0"
              stroke-linecap="round" opacity="1"/>
      </svg>
    </div>
  </div>

</main>

</body>
</html>
